name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: |
          cd cli && uv run pyright src
          cd ../libs/experiment-definition && uv run pyright src
          cd ../jax-eval && uv run pyright
          cd ../jax-nn && uv run pyright src
          cd ../jax-replay && uv run pyright src
          cd ../jax-utils && uv run pyright src
          cd ../research-analysis && uv run pyright src
          cd ../research-cluster && uv run pyright src
          cd ../research-instrument && uv run pyright src
          cd ../research-plot && uv run pyright src
          cd ../research-store && uv run pyright src
          cd ../rl-components && uv run pyright src
          cd ../rl-agents && uv run pyright src
          cd ../.. && uv run pyright tests examples scripts

  test-small:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest tests/small/ -x -q

  test-medium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest tests/medium/ -x -q

  test-jaxatari-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --frozen
      - name: Install JAXAtari assets
        env:
          JAXATARI_CONFIRM_OWNERSHIP: "1"
          XDG_DATA_HOME: ${{ runner.temp }}/xdg-data
        run: uv run python scripts/install_jaxatari_assets.py
      - name: Run JAXAtari smoke test
        env:
          JAXATARI_RUN_SMOKE: "1"
          XDG_DATA_HOME: ${{ runner.temp }}/xdg-data
        run: uv run pytest tests/regression/test_rl_components_atari_real_smoke.py -x -q

  benchmarks:
    needs: [lint, typecheck, test-small, test-medium]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --frozen
      - name: Run pytest benchmarks
        run: |
          uv run pytest --benchmark-only --benchmark-json output.json tests/performance/
          git restore .
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Env Seam Benchmark
          tool: pytest
          output-file-path: output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: "125%"
          comment-on-alert: true
          comment-always: true
          summary-always: true
          fail-on-alert: false
          auto-push: ${{ github.ref == 'refs/heads/main' }}
